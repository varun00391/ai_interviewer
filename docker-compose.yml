services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:8080}
      DATABASE_URL: sqlite+aiosqlite:////app/data/interview.db
      PROMPT_LOG_PATH: /app/data/prompt.md
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173}
    volumes:
      - backend_data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  backend_data:
